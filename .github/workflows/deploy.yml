name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o zyranet-api .

      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          scp -i ~/.ssh/deploy_key zyranet-api "$SSH_USER@$SSH_HOST:/opt/zyranet-api/zyranet-api.new"
          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" '
            set -e
            sudo systemctl stop zyranet-api
            mv /opt/zyranet-api/zyranet-api.new /opt/zyranet-api/zyranet-api
            chmod 750 /opt/zyranet-api/zyranet-api
            sudo systemctl start zyranet-api
            sudo systemctl status zyranet-api --no-pager -l | head -10
          '
